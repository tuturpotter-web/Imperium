name: Build MacroDeck EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install pyserial bleak psutil GPUtil keyboard mouse websockets
          pip install pywin32 comtypes pycaw WMI

      - name: Copy gui.html next to backend
        run: copy gui.html gui.html

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --noconsole `
            --name MacroDeck `
            --add-data "gui.html;." `
            --hidden-import win32gui `
            --hidden-import win32process `
            --hidden-import win32api `
            --hidden-import win32con `
            --hidden-import pycaw.pycaw `
            --hidden-import comtypes `
            --hidden-import wmi `
            --hidden-import bleak `
            --hidden-import GPUtil `
            --hidden-import serial `
            --hidden-import serial.tools.list_ports `
            --hidden-import websockets `
            --hidden-import keyboard `
            --hidden-import mouse `
            backend.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacroDeck-EXE
          path: dist/MacroDeck.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MacroDeck.exe
          name: MacroDeck ${{ github.ref_name }}
          body: |
            ## MacroDeck ${{ github.ref_name }}
            
            ### Installation
            1. Télécharge `MacroDeck.exe`
            2. Place-le dans un dossier dédié
            3. Double-clique pour lancer — le navigateur s'ouvre automatiquement
            
            ### Dépendances externes
            - [OpenHardwareMonitor](https://openhardwaremonitor.org/) (optionnel, pour les températures CPU/GPU)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
