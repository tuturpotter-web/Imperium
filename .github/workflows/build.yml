name: Build MacroDeck

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install pyserial psutil keyboard mouse websockets
          pip install pywin32 comtypes pycaw WMI

      - name: Build with PyInstaller (onedir)
        run: |
          pyinstaller `
            --onedir `
            --noconsole `
            --name MacroDeck `
            --add-data "gui.html;." `
            --hidden-import win32gui `
            --hidden-import win32process `
            --hidden-import win32api `
            --hidden-import win32con `
            --hidden-import pycaw.pycaw `
            --hidden-import comtypes `
            --hidden-import wmi `
            --hidden-import serial `
            --hidden-import serial.tools.list_ports `
            --hidden-import websockets `
            --hidden-import keyboard `
            --hidden-import mouse `
            --hidden-import tkinter `
            --hidden-import queue `
            backend.py

      # Inno Setup est pré-installé sur windows-latest dans C:\Program Files (x86)\Inno Setup 6
      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            # Fallback : chercher dans d'autres emplacements courants
            $iscc = Get-ChildItem "C:\Program Files*\Inno Setup*\ISCC.exe" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          }
          if (!$iscc) {
            Write-Error "Inno Setup introuvable sur le runner"
            exit 1
          }
          Write-Host "Inno Setup trouvé : $iscc"
          & $iscc installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacroDeck-Setup
          path: installer_output/MacroDeck_Setup.exe

      - name: Generate build tag
        id: tag
        shell: bash
        run: echo "name=build-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: installer_output/MacroDeck_Setup.exe
          name: MacroDeck build #${{ github.run_number }}
          body: |
            ## MacroDeck — build automatique #${{ github.run_number }}

            Compilé depuis le commit ${{ github.sha }}

            ### Installation
            1. Télécharge `MacroDeck_Setup.exe`
            2. Lance-le et suis le wizard (1 minute)
            3. MacroDeck s'installe dans `Program Files`, avec raccourci Menu Démarrer
            4. Désinstallation propre depuis **Paramètres Windows → Applications**

            ### Ce que l'installeur configure
            - Installation dans `Program Files\MacroDeck`
            - Raccourci Menu Démarrer (par défaut)
            - Raccourci Bureau (optionnel)
            - Lancement au démarrage Windows (optionnel)
            - Désinstalleur enregistré dans Paramètres Windows

            ### Plugins (sans recompiler)
            Un dossier `plugins\` est créé automatiquement à côté de `MacroDeck.exe`.
            Pose-y des fichiers `.json` pour ajouter de nouvelles actions, puis clique sur
            "🔄 Recharger les plugins" dans l'onglet Plugins.

            ### Dépendances externes (optionnel)
            - [OpenHardwareMonitor](https://openhardwaremonitor.org/) pour les températures CPU/GPU
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
